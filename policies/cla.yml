name: Contributor License Agreement Policy
description: CLA policy file
resource: repository
where:
configuration:
  cla:
    content: https://raw.githubusercontent.com/holos-run/.github/main/CLA/holos.yml
    minimalChangeRequired:
      files: 1
      codeLines: 1
    bypassUsers:
      - dependabot[bot]
      - github-actions[bot]
      - renovate[bot]
      - microsoft-github-policy-service[bot]
    checkSummary: |
      Thank you for contributing. Open Infrastructure Operations LLC requires contributors to sign the Contributor License Agreement before a pull request can be merged.
